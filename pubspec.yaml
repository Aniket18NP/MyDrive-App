publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Maps
  google_maps_flutter: ^2.12.3
  geolocator: ^14.0.2
  http: ^1.2.1
